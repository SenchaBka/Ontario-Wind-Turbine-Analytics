<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontario Wind Turbines</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    header span {
      font-size: 0.9rem;
      color: #aaa;
    }

    #map {
      flex: 1;
      position: relative;
    }

    #controls {
      background: white;
      border-top: 1px solid #ddd;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #controls label {
      font-weight: 500;
      white-space: nowrap;
      min-width: 80px;
    }

    #year-slider {
      flex: 1;
      cursor: pointer;
      accent-color: #1a1a2e;
    }

    #year-display {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 50px;
      text-align: right;
    }

    #count {
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
    }

    #wind-toggle {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #wind-toggle:hover { background: #2e2e50; }
    #wind-toggle.off   { background: #888; }

    /* Wind speed legend */
    #wind-legend {
      position: absolute;
      bottom: 24px;
      right: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.93);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      font-size: 11px;
      line-height: 1.6;
      min-width: 170px;
    }
    #wind-legend h4 {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #222;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>

  <header>
    <h1>Ontario Wind Turbines</h1>
    <span id="header-range"></span>
  </header>

  <div id="map">
    <div id="wind-legend" style="display:none">
      <h4>Wind Speed · 100 m</h4>
      <div class="legend-row"><span class="legend-swatch" style="background:#f7f7f7"></span><span>&lt; 5 m/s — Not viable</span></div>
      <div class="legend-row"><span class="legend-swatch" style="background:#fcae91"></span><span>5 – 6.5 m/s — Marginal</span></div>
      <div class="legend-row"><span class="legend-swatch" style="background:#fb6a4a"></span><span>6.5 – 8 m/s — Viable</span></div>
      <div class="legend-row"><span class="legend-swatch" style="background:#de2d26"></span><span>&gt; 8 m/s — Excellent</span></div>
      <div class="legend-row"><span class="legend-swatch" style="background:#a50f15"></span><span>&gt; 10 m/s — Exceptional</span></div>
    </div>
  </div>

  <div id="controls">
    <label for="year-slider">Year built by:</label>
    <input type="range" id="year-slider" />
    <span id="year-display"></span>
    <span id="count"></span>
    <button id="wind-toggle" class="off">Wind Speed OFF</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = 'http://localhost:5000';

    const map = L.map('map').setView([51.2538, -85.3232], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, &copy; CartoDB'
    }).addTo(map);

    let markers = L.layerGroup().addTo(map);
    let windOverlay = null;
    let windVisible = false;

    const slider      = document.getElementById('year-slider');
    const yearDisplay = document.getElementById('year-display');
    const countEl     = document.getElementById('count');
    const windToggle  = document.getElementById('wind-toggle');
    const windLegend  = document.getElementById('wind-legend');

    // ── Wind overlay ──────────────────────────────────────────────
    fetch(`${API}/api/wind-overlay`)
      .then(r => r.json())
      .then(meta => {
        windOverlay = L.imageOverlay(
          `${API}/api/wind-overlay/image`,
          meta.bounds,
          { opacity: 1.0, interactive: false }
        );
      });

    windToggle.addEventListener('click', () => {
      if (!windOverlay) return;
      windVisible = !windVisible;
      if (windVisible) {
        windOverlay.addTo(map);
        windToggle.textContent = 'Wind Speed ON';
        windToggle.classList.remove('off');
        windLegend.style.display = 'block';
      } else {
        map.removeLayer(windOverlay);
        windToggle.textContent = 'Wind Speed OFF';
        windToggle.classList.add('off');
        windLegend.style.display = 'none';
      }
    });

    // ── Turbines ──────────────────────────────────────────────────
    fetch(`${API}/api/years`)
      .then(r => r.json())
      .then(({ min, max }) => {
        slider.min = min;
        slider.max = max;
        slider.value = max;
        yearDisplay.textContent = max;
        document.getElementById('header-range').textContent = `${min} – ${max}`;
        loadTurbines(max);
      });

    slider.addEventListener('input', () => {
      yearDisplay.textContent = slider.value;
    });

    slider.addEventListener('change', () => {
      loadTurbines(parseInt(slider.value));
    });

    function loadTurbines(year) {
      fetch(`${API}/api/turbines?year=${year}`)
        .then(r => r.json())
        .then(data => {
          markers.clearLayers();
          data.forEach(t => {
            const popup = Object.entries(t)
              .map(([k, v]) => `<b>${k}</b>: ${v ?? '—'}`)
              .join('<br>');
            L.circleMarker([t.Latitude, t.Longitude], {
              radius: 5,
              color: '#1a1a2e',
              fillColor: '#4a90d9',
              fillOpacity: 0.8,
              weight: 1
            })
            .bindPopup(popup, { maxWidth: 300 })
            .addTo(markers);
          });
          countEl.textContent = `${data.length} turbines`;
        });
    }
  </script>
</body>
</html>
