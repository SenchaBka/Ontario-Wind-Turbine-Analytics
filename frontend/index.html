<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontario Wind Turbines</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    header span {
      font-size: 0.9rem;
      color: #aaa;
    }

    #map {
      flex: 1;
    }

    #controls {
      background: white;
      border-top: 1px solid #ddd;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #controls label {
      font-weight: 500;
      white-space: nowrap;
      min-width: 80px;
    }

    #year-slider {
      flex: 1;
      cursor: pointer;
      accent-color: #1a1a2e;
    }

    #year-display {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 50px;
      text-align: right;
    }

    #count {
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ontario Wind Turbines</h1>
    <span id="header-range"></span>
  </header>

  <div id="map"></div>

  <div id="controls">
    <label for="year-slider">Year built by:</label>
    <input type="range" id="year-slider" />
    <span id="year-display"></span>
    <span id="count"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = 'http://localhost:5000';

    const map = L.map('map').setView([51.2538, -85.3232], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, &copy; CartoDB'
    }).addTo(map);

    let markers = L.layerGroup().addTo(map);
    const slider = document.getElementById('year-slider');
    const yearDisplay = document.getElementById('year-display');
    const countEl = document.getElementById('count');

    // Load year range first, then turbines
    fetch(`${API}/api/years`)
      .then(r => r.json())
      .then(({ min, max }) => {
        slider.min = min;
        slider.max = max;
        slider.value = max;
        yearDisplay.textContent = max;
        document.getElementById('header-range').textContent = `${min} – ${max}`;
        loadTurbines(max);
      });

    slider.addEventListener('input', () => {
      yearDisplay.textContent = slider.value;
    });

    slider.addEventListener('change', () => {
      loadTurbines(parseInt(slider.value));
    });

    function loadTurbines(year) {
      fetch(`${API}/api/turbines?year=${year}`)
        .then(r => r.json())
        .then(data => {
          markers.clearLayers();
          data.forEach(t => {
            const popup = Object.entries(t)
              .map(([k, v]) => `<b>${k}</b>: ${v ?? '—'}`)
              .join('<br>');
            L.circleMarker([t.Latitude, t.Longitude], {
              radius: 5,
              color: '#1a1a2e',
              fillColor: '#4a90d9',
              fillOpacity: 0.8,
              weight: 1
            })
            .bindPopup(popup, { maxWidth: 300 })
            .addTo(markers);
          });
          countEl.textContent = `${data.length} turbines`;
        });
    }
  </script>
</body>
</html>
